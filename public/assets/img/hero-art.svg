<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE7C9"/>
      <stop offset="1" stop-color="#FFF7EC"/>
    </linearGradient>
    <linearGradient id="saf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF9933"/>
      <stop offset="1" stop-color="#E67E22"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#FFC107" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame -->
  <rect x="20" y="20" width="480" height="480" rx="24" fill="url(#sky)"/>
  <circle cx="380" cy="160" r="180" fill="url(#glow)"/>

  <!-- Skyline silhouette: India Gate + Taj domes + temple shikhara -->
  <g fill="#0A1F44" opacity="0.86">
    <!-- India Gate -->
    <path d="M70 380 L70 320 Q70 300 90 300 L110 300 Q130 300 130 320 L130 380 Z"/>
    <rect x="78" y="290" width="44" height="10"/>
    <rect x="88" y="278" width="24" height="12"/>
    <!-- Temple shikhara -->
    <path d="M160 380 L160 330 L172 308 L184 330 L184 380 Z"/>
    <path d="M158 308 L172 280 L186 308 Z"/>
    <circle cx="172" cy="276" r="4"/>
    <!-- Taj dome -->
    <path d="M220 380 L220 332 Q220 308 250 308 Q280 308 280 332 L280 380 Z"/>
    <path d="M232 308 Q232 282 250 270 Q268 282 268 308 Z"/>
    <rect x="246" y="262" width="8" height="10"/>
    <!-- Minaret -->
    <rect x="206" y="312" width="8" height="68"/>
    <rect x="286" y="312" width="8" height="68"/>
    <!-- Modern tower -->
    <path d="M320 380 L320 250 L332 240 L344 250 L344 380 Z"/>
    <path d="M324 254 h16 M324 266 h16 M324 278 h16 M324 290 h16 M324 302 h16 M324 314 h16 M324 326 h16 M324 338 h16 M324 350 h16" stroke="#FFF7EC" stroke-width="1.5"/>
    <!-- Antenna tower -->
    <path d="M390 380 L376 312 L394 312 Z"/>
    <line x1="385" y1="312" x2="385" y2="270" stroke="#0A1F44" stroke-width="2"/>
    <circle cx="385" cy="266" r="4"/>
    <!-- Studio block -->
    <rect x="410" y="320" width="64" height="60"/>
    <rect x="418" y="332" width="14" height="14" fill="#FF9933"/>
    <rect x="438" y="332" width="14" height="14" fill="#FFC107"/>
    <rect x="458" y="332" width="10" height="14" fill="#FFFFFF"/>
    <rect x="418" y="354" width="48" height="6" fill="#FFFFFF"/>
  </g>

  <!-- Ground line -->
  <line x1="40" y1="380" x2="480" y2="380" stroke="#0A1F44" stroke-width="2" opacity="0.4"/>

  <!-- Chakra sun behind -->
  <g transform="translate(390 150)" stroke="url(#saf)" stroke-width="1.6" fill="none" opacity="0.9">
    <circle r="62"/>
    <circle r="54"/>
    <circle r="6" fill="url(#saf)" stroke="none"/>
    <g>
      <line x1="0" y1="-62" x2="0" y2="62"/>
      <line x1="-62" y1="0" x2="62" y2="0"/>
      <line x1="-44" y1="-44" x2="44" y2="44"/>
      <line x1="44" y1="-44" x2="-44" y2="44"/>
      <line x1="-24" y1="-57" x2="24" y2="57"/>
      <line x1="24" y1="-57" x2="-24" y2="57"/>
      <line x1="-57" y1="-24" x2="57" y2="24"/>
      <line x1="-57" y1="24" x2="57" y2="-24"/>
    </g>
  </g>

  <!-- Microphone icon (foreground) -->
  <g transform="translate(130 220)">
    <rect x="-12" y="-30" width="24" height="44" rx="12" fill="url(#saf)"/>
    <path d="M-20 6 Q -20 28 0 28 Q 20 28 20 6" stroke="#0A1F44" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="28" x2="0" y2="50" stroke="#0A1F44" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="50" x2="12" y2="50" stroke="#0A1F44" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Camera icon -->
  <g transform="translate(430 240)" fill="#0A1F44">
    <rect x="-30" y="-16" width="56" height="36" rx="6"/>
    <rect x="26" y="-8" width="14" height="20" rx="3"/>
    <circle cx="-8" cy="2" r="10" fill="#FF9933"/>
    <circle cx="-8" cy="2" r="5" fill="#0A1F44"/>
    <rect x="-30" y="-22" width="20" height="6" rx="2"/>
  </g>

  <!-- Tricolor ribbon -->
  <g transform="translate(40 50)">
    <rect x="0" y="0" width="120" height="6" fill="#0A1F44"/>
    <rect x="0" y="6" width="120" height="3" fill="#FFC107"/>
    <rect x="0" y="9" width="120" height="6" fill="#FF9933"/>
  </g>
</svg>
